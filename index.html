<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fff0f5">
  <title>Đừng buồn nữa nhé</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      height: 100dvh;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 35%, #ffe4ef 0%, #fff8fb 55%, #ffe0ec 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      position: relative;
    }

    #power-bar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: min(240px, 75vw);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 30;
      text-align: center;
    }
    #power-bar.show { opacity: 1; }

    #power-bar span {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #c0003a;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    #power-bar .track {
      height: 9px;
      background: rgba(255,170,200,.3);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid rgba(255,100,150,.2);
    }

    #power-bar .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffb3d1, #ff3366, #cc0033);
      border-radius: 99px;
      transition: width .1s ease-out;
      box-shadow: 0 0 8px rgba(220,0,60,.4);
    }

    #heart {
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #heart svg {
      width: 140px;
      height: 140px;
      filter: drop-shadow(0 8px 28px rgba(210,0,50,.38));
    }

    @keyframes beat {
      0%   { transform: scale(1); }
      20%  { transform: scale(1.24); }
      45%  { transform: scale(0.91); }
      65%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    #heart.beating svg { animation: beat .48s cubic-bezier(.36,.07,.19,.97); }

    @keyframes heart-out {
      0%  { transform: scale(1); opacity: 1; }
      35% { transform: scale(1.9); opacity: 1; filter: drop-shadow(0 0 40px rgba(255,60,80,1)); }
      100%{ transform: scale(0); opacity: 0; }
    }
    #heart.popping svg { animation: heart-out .65s ease forwards; }

    #main-btn {
      background: linear-gradient(135deg, #ff7aaa 0%, #e0003a 100%);
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 99px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .3px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      box-shadow: 0 4px 20px rgba(220,0,58,.4), 0 1px 0 rgba(255,255,255,.25) inset;
      transition: transform .1s, opacity .4s;
      -webkit-appearance: none;
    }
    #main-btn:active { transform: scale(.93); }

    .dot {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: dot-fly var(--d,.7s) ease-out forwards;
      z-index: 40;
    }
    @keyframes dot-fly {
      from { opacity: 1; transform: scale(1) translate(0,0); }
      to   { opacity: 0; transform: scale(0) translate(var(--dx),var(--dy)); }
    }

    .emoji-piece {
      position: fixed;
      pointer-events: none;
      font-size: 22px;
      line-height: 1;
      animation: emoji-fly 1.1s ease-out forwards;
      z-index: 40;
    }
    @keyframes emoji-fly {
      from { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1.2); }
      to   { opacity: 0; transform: translate(var(--dx),var(--dy)) rotate(var(--r)) scale(.1); }
    }

    #backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10,0,8,.78);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity .5s .1s;
    }
    #backdrop.show { opacity: 1; pointer-events: all; }

    #back-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.2);
      border-radius: 50%;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      z-index: 70;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s .4s, transform .15s;
    }
    #back-btn.show { opacity: 1; pointer-events: all; }
    #back-btn:active { transform: scale(.88); }

    .card {
      position: fixed;
      width: 108px;
      height: 150px;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid rgba(255,130,170,.25);
      background: #1c0010;
      cursor: grab;
      z-index: 60;
      box-shadow: 0 8px 28px rgba(0,0,0,.6);
      opacity: 0;
      touch-action: none;
    }
    .card:active { cursor: grabbing; }
    .card.dragging { box-shadow: 0 16px 48px rgba(0,0,0,.8), 0 0 24px rgba(255,80,140,.3); }

    .card img,
    .card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.18);
      transition: opacity .2s;
    }

    .play-icon {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,.88);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play-icon::after {
      content: '';
      border-left: 14px solid #d0003a;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      margin-left: 3px;
    }

    #viewer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.97);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s;
    }
    #viewer.open { opacity: 1; pointer-events: all; }

    #viewer-close {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,.13);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      z-index: 101;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    #viewer-content {
      max-width: 100vw;
      max-height: 100dvh;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #viewer-content img  { max-width: 100%; max-height: 92dvh; border-radius: 10px; object-fit: contain; }
    #viewer-content video{ max-width: 100%; max-height: 92dvh; border-radius: 10px; }
  </style>
</head>
<body>

<div id="power-bar">
  <span>Tình yêu ⚡</span>
  <div class="track"><div class="fill" id="fill"></div></div>
</div>

<div id="heart">
  <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg" fill="#e0003a">
    <path d="M50 85 C50 85 5 55 5 28 C5 12 16 3 28 3 C36 3 44 7 50 15 C56 7 64 3 72 3 C84 3 95 12 95 28 C95 55 50 85 50 85 Z"/>
  </svg>
</div>

<button id="main-btn">đừng buồn nữa nhé 🥹</button>

<div id="backdrop"></div>
<button id="back-btn" onclick="resetAll()">✕</button>

<div id="viewer">
  <button id="viewer-close" onclick="closeViewer()">✕</button>
  <div id="viewer-content"></div>
</div>

<script>
const media = [
  { type: 'image', src: 'media/photo1.jpg'  },
  { type: 'video', src: 'media/video1.mp4'  },
  { type: 'video', src: 'media/video2.mp4'  },
  { type: 'video', src: 'media/video3.mp4'  },
  { type: 'video', src: 'media/video4.mp4'  },
];

const MAX_POWER = 38;
let power = 0;
let decayTimer = null;
let exploded = false;
let cards = [];

const heartEl   = document.getElementById('heart');
const barEl     = document.getElementById('power-bar');
const fillEl    = document.getElementById('fill');
const btnEl     = document.getElementById('main-btn');
const backdrop  = document.getElementById('backdrop');
const backBtn   = document.getElementById('back-btn');
const viewer    = document.getElementById('viewer');
const viewerContent = document.getElementById('viewer-content');

function onPress(e) {
  if (exploded) return;
  e.preventDefault();

  heartEl.classList.remove('beating');
  void heartEl.offsetWidth;
  heartEl.classList.add('beating');

  const cx = e.clientX ?? (e.touches?.[0]?.clientX ?? innerWidth / 2);
  const cy = e.clientY ?? (e.touches?.[0]?.clientY ?? innerHeight / 2);
  spawnDots(cx, cy, 5);

  power = Math.min(power + 1, MAX_POWER);
  fillEl.style.width = (power / MAX_POWER * 100) + '%';
  if (power >= 3) barEl.classList.add('show');

  clearTimeout(decayTimer);
  decayTimer = setTimeout(decay, 1800);

  if (power >= MAX_POWER) explode();
}

heartEl.addEventListener('click', onPress);
btnEl.addEventListener('click', onPress);
heartEl.addEventListener('touchstart', onPress, { passive: false });
btnEl.addEventListener('touchstart',   onPress, { passive: false });

function decay() {
  if (exploded || power <= 0) return;
  power = Math.max(0, power - 1);
  fillEl.style.width = (power / MAX_POWER * 100) + '%';
  if (power === 0) barEl.classList.remove('show');
  else decayTimer = setTimeout(decay, 320);
}

const dotColors = ['#ff6b9d','#e8003c','#ff99c0','#ff3366','#ffb3d1'];

function spawnDots(cx, cy, n) {
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'dot';
    const sz = 5 + Math.random() * 8;
    const a  = Math.random() * Math.PI * 2;
    const d  = 35 + Math.random() * 65;
    el.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${cx - sz/2}px; top:${cy - sz/2}px;
      background:${dotColors[Math.random() * dotColors.length | 0]};
      --dx:${Math.cos(a) * d}px; --dy:${Math.sin(a) * d}px;
      --d:${.5 + Math.random() * .4}s
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 950);
  }
}

const emojiPool = ['❤️','💕','💖','💗','✨','🌸','💝','🥰','💓','🌺'];

function bigBurst() {
  const cx = innerWidth / 2, cy = innerHeight / 2;
  for (let i = 0; i < 52; i++) {
    const el  = document.createElement('div');
    el.className = 'emoji-piece';
    const a   = (i / 52) * Math.PI * 2 + (Math.random() - .5) * .5;
    const d   = 80 + Math.random() * 220;
    el.textContent = emojiPool[Math.random() * emojiPool.length | 0];
    el.style.cssText = `left:${cx}px; top:${cy}px; --dx:${Math.cos(a)*d}px; --dy:${Math.sin(a)*d}px; --r:${Math.random()*720-360}deg`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

function getPositions(n, w, h) {
  const vw = innerWidth, vh = innerHeight;
  const cx = vw / 2 - w / 2, cy = vh / 2 - h / 2;
  const out = [];
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2 + (Math.random() - .5) * .7;
    const rx = vw * .33 + Math.random() * vw * .08;
    const ry = vh * .26 + Math.random() * vh * .08;
    let x = cx + Math.cos(angle) * rx;
    let y = cy + Math.sin(angle) * ry;
    x = Math.max(8, Math.min(vw - w - 8, x));
    y = Math.max(55, Math.min(vh - h - 16, y));
    out.push({ x, y, rot: (Math.random() - .5) * 22 });
  }
  return out;
}

function explode() {
  exploded = true;
  clearTimeout(decayTimer);

  heartEl.classList.add('popping');
  btnEl.style.opacity = '0';
  btnEl.style.pointerEvents = 'none';
  barEl.style.opacity = '0';

  bigBurst();

  setTimeout(() => {
    backdrop.classList.add('show');
    backBtn.classList.add('show');
    buildCards();
  }, 600);
}

function buildCards() {
  const W = 108, H = 150;
  const positions = getPositions(media.length, W, H);
  const cx = innerWidth / 2 - W / 2;
  const cy = innerHeight / 2 - H / 2;

  cards = [];

  media.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.left = cx + 'px';
    card.style.top  = cy + 'px';
    card.style.transform = `scale(0) rotate(0deg)`;

    if (item.type === 'image') {
      const img = document.createElement('img');
      img.src = item.src;
      img.loading = 'lazy';
      card.appendChild(img);
    } else {
      const vid = document.createElement('video');
      vid.src = item.src;
      vid.muted = true;
      vid.loop  = true;
      vid.playsInline = true;
      vid.preload = 'metadata';
      card.appendChild(vid);

      const ov = document.createElement('div');
      ov.className = 'play-overlay';
      const ic = document.createElement('div');
      ic.className = 'play-icon';
      ov.appendChild(ic);
      card.appendChild(ov);
    }

    document.body.appendChild(card);
    cards.push(card);

    const pos = positions[i];
    const delay = 80 + i * 100;

    setTimeout(() => {
      card.style.transition = `left .55s cubic-bezier(.22,1,.36,1) ${delay}ms,
                               top  .55s cubic-bezier(.22,1,.36,1) ${delay}ms,
                               transform .55s cubic-bezier(.22,1,.36,1) ${delay}ms,
                               opacity .3s ease ${delay}ms`;
      card.style.left      = pos.x + 'px';
      card.style.top       = pos.y + 'px';
      card.style.transform = `scale(1) rotate(${pos.rot}deg)`;
      card.style.opacity   = '1';
    }, 20);

    makeDraggable(card, item, pos.rot);
  });
}

function makeDraggable(card, item, baseRot) {
  let drag = null;
  let holdTimer = null;
  let previewing = false;

  card.addEventListener('pointerdown', e => {
    e.preventDefault();
    card.setPointerCapture(e.pointerId);
    card.style.transition = 'box-shadow .15s, border-color .15s';
    card.style.zIndex = '65';

    drag = {
      px:    e.clientX,
      py:    e.clientY,
      ox:    parseFloat(card.style.left)  || 0,
      oy:    parseFloat(card.style.top)   || 0,
      moved: false,
      t:     Date.now()
    };

    holdTimer = setTimeout(() => {
      if (!drag || drag.moved) return;
      if (item.type === 'video') {
        previewing = true;
        const v = card.querySelector('video');
        const o = card.querySelector('.play-overlay');
        v.play();
        if (o) o.style.opacity = '0';
      }
    }, 350);
  });

  card.addEventListener('pointermove', e => {
    if (!drag) return;
    const dx = e.clientX - drag.px;
    const dy = e.clientY - drag.py;
    if (!drag.moved && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
      drag.moved = true;
      clearTimeout(holdTimer);
      holdTimer = null;
      card.classList.add('dragging');
      card.style.transform = `scale(1.06) rotate(${baseRot}deg)`;
    }
    if (drag.moved) {
      card.style.left = (drag.ox + dx) + 'px';
      card.style.top  = (drag.oy + dy) + 'px';
    }
  });

  card.addEventListener('pointerup', e => {
    if (!drag) return;
    clearTimeout(holdTimer);
    card.classList.remove('dragging');
    card.style.zIndex = '60';
    card.style.transform = `scale(1) rotate(${baseRot}deg)`;

    if (previewing) {
      previewing = false;
      const v = card.querySelector('video');
      const o = card.querySelector('.play-overlay');
      if (v) { v.pause(); v.currentTime = 0; }
      if (o) o.style.opacity = '1';
    } else if (!drag.moved && Date.now() - drag.t < 400) {
      openViewer(item);
    }

    drag = null;
  });

  card.addEventListener('pointercancel', () => {
    clearTimeout(holdTimer);
    card.classList.remove('dragging');
    card.style.zIndex = '60';
    if (previewing) {
      previewing = false;
      const v = card.querySelector('video');
      const o = card.querySelector('.play-overlay');
      if (v) { v.pause(); v.currentTime = 0; }
      if (o) o.style.opacity = '1';
    }
    drag = null;
  });
}

function openViewer(item) {
  viewerContent.innerHTML = '';
  if (item.type === 'image') {
    const img = document.createElement('img');
    img.src = item.src;
    viewerContent.appendChild(img);
  } else {
    const vid = document.createElement('video');
    vid.src = item.src;
    vid.controls  = true;
    vid.autoplay  = true;
    vid.playsInline = true;
    viewerContent.appendChild(vid);
  }
  viewer.classList.add('open');
}

function closeViewer() {
  const v = viewerContent.querySelector('video');
  if (v) { v.pause(); v.src = ''; }
  viewer.classList.remove('open');
}

function resetAll() {
  closeViewer();

  const cx = innerWidth / 2 - 54;
  const cy = innerHeight / 2 - 75;

  cards.forEach((c, i) => {
    c.style.transition = `left .38s ease ${i*35}ms, top .38s ease ${i*35}ms, transform .38s ease ${i*35}ms, opacity .28s ease ${i*35}ms`;
    c.style.left      = cx + 'px';
    c.style.top       = cy + 'px';
    c.style.transform = 'scale(0)';
    c.style.opacity   = '0';
  });

  backdrop.classList.remove('show');
  backBtn.classList.remove('show');

  setTimeout(() => {
    cards.forEach(c => c.remove());
    cards = [];
  }, 480);

  setTimeout(() => {
    heartEl.classList.remove('popping', 'beating');
    const svg = heartEl.querySelector('svg');
    svg.style.animation  = 'none';
    svg.style.transform  = 'scale(1)';
    svg.style.opacity    = '1';
    btnEl.style.opacity       = '1';
    btnEl.style.pointerEvents = '';
    barEl.style.opacity       = '1';

    exploded = false;
    power    = 0;
    fillEl.style.width = '0%';
    barEl.classList.remove('show');
    clearTimeout(decayTimer);
  }, 240);
}

viewer.addEventListener('click', e => { if (e.target === viewer) closeViewer(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (viewer.classList.contains('open')) closeViewer();
    else if (exploded) resetAll();
  }
});
</script>
</body>
</html>
