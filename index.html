<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffe6f0">
  <title>Đừng buồn nữa nhé</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --red: #e8003c;
      --pink: #ff6b9d;
      --bg: #fff5f8;
    }

    body {
      min-height: 100dvh;
      background: radial-gradient(ellipse at 50% 30%, #ffe0ec 0%, #fff5f8 60%, #ffe8f0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
      gap: 40px;
    }

    /* ── POWER BAR ── */
    .bar-wrap {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: min(260px, 80vw);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 10;
      text-align: center;
    }
    .bar-wrap.show { opacity: 1; }
    .bar-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--red);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .bar-track {
      height: 10px;
      background: rgba(255,180,210,.3);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,100,150,.25);
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffb3d1, #ff3366, #e8003c);
      border-radius: 999px;
      transition: width .12s ease-out;
      box-shadow: 0 0 6px rgba(232,0,60,.4);
    }
    .bar-fill.pulse {
      animation: barpulse .3s ease;
    }
    @keyframes barpulse {
      50% { box-shadow: 0 0 18px rgba(255,0,80,.9); }
    }

    /* ── HEART ── */
    .heart-wrap {
      position: relative;
      width: 130px;
      height: 118px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      filter: drop-shadow(0 8px 24px rgba(232,0,60,.35));
      flex-shrink: 0;
    }

    /* 3 pieces that compose the heart */
    .hp {
      position: absolute;
      background: var(--red);
    }
    /* left circle */
    .hp-cl {
      width: 65px; height: 65px;
      border-radius: 50%;
      top: 0; left: 0;
    }
    /* right circle */
    .hp-cr {
      width: 65px; height: 65px;
      border-radius: 50%;
      top: 0; right: 0;
    }
    /* square rotated 45° → diamond pointing down */
    .hp-sq {
      width: 65px; height: 65px;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      border-radius: 4px;
    }

    /* shine dot */
    .heart-shine {
      position: absolute;
      width: 18px; height: 18px;
      background: rgba(255,255,255,.55);
      border-radius: 50%;
      top: 10px; left: 14px;
      pointer-events: none;
      z-index: 2;
    }

    /* beat animation */
    @keyframes beat {
      0%   { transform: scale(1); }
      25%  { transform: scale(1.22); }
      55%  { transform: scale(0.93); }
      75%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .heart-wrap.beating {
      animation: beat .45s cubic-bezier(.36,.07,.19,.97) forwards;
    }

    /* explosion scale */
    @keyframes explodeHeart {
      0%  { transform: scale(1); filter: drop-shadow(0 8px 24px rgba(232,0,60,.35)); }
      40% { transform: scale(1.8); filter: drop-shadow(0 0 40px rgba(255,80,80,1)); }
      100%{ transform: scale(0); opacity: 0; }
    }
    .heart-wrap.exploding {
      animation: explodeHeart .6s ease forwards;
    }

    /* ── BUTTON ── */
    .btn {
      background: linear-gradient(135deg, #ff6b9d 0%, #e8003c 100%);
      color: #fff;
      border: none;
      padding: 15px 34px;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .4px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      box-shadow: 0 4px 22px rgba(232,0,60,.38), 0 1px 0 rgba(255,255,255,.2) inset;
      transition: transform .1s, box-shadow .1s;
      position: relative;
      z-index: 5;
      -webkit-appearance: none;
    }
    .btn:active { transform: scale(.94); box-shadow: 0 2px 10px rgba(232,0,60,.3); }

    /* ── PARTICLES ── */
    .ptcl {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: fly var(--dur) ease-out forwards;
      z-index: 20;
    }
    @keyframes fly {
      from { opacity: 1; transform: scale(1) translate(0,0); }
      to   { opacity: 0; transform: scale(0) translate(var(--dx), var(--dy)); }
    }
    .xptcl {
      position: fixed;
      pointer-events: none;
      animation: xfly 1.1s ease-out forwards;
      z-index: 25;
      font-size: 22px;
      line-height: 1;
    }
    @keyframes xfly {
      from { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
      to   { opacity: 0; transform: translate(var(--dx),var(--dy)) rotate(var(--rot)) scale(.2); }
    }

    /* ── GALLERY OVERLAY ── */
    .gallery {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #12000d 0%, #260018 50%, #12000d 100%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px 16px 40px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .5s .2s;
    }
    .gallery.open { opacity: 1; pointer-events: all; }

    .gallery-title {
      color: #ffb3d1;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin: 16px 0 24px;
      letter-spacing: .5px;
      text-shadow: 0 0 20px rgba(255,100,160,.5);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }

    .g-item {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      aspect-ratio: 9/16;
      background: #1e0012;
      cursor: pointer;
      border: 2px solid rgba(255,100,160,.15);
      transition: border-color .2s, transform .15s;
      -webkit-transform: translateZ(0);
    }
    .g-item.pressed { transform: scale(.95); border-color: rgba(255,100,160,.7); }

    .g-item img, .g-item video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .g-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.2);
      transition: opacity .2s;
    }
    .g-play-icon {
      width: 46px; height: 46px;
      background: rgba(255,255,255,.85);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .g-play-icon::after {
      content: '';
      border-left: 16px solid var(--red);
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      margin-left: 4px;
    }

    /* gallery entrance animation */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(30px) scale(.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .g-item { opacity: 0; }
    .g-item.entered { animation: slideIn .4s ease forwards; }

    /* ── MODAL ── */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.96);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .modal.open { opacity: 1; pointer-events: all; }
    .modal-close {
      position: fixed;
      top: 14px; right: 14px;
      width: 42px; height: 42px;
      background: rgba(255,255,255,.12);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      z-index: 101;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-inner {
      max-width: 100vw;
      max-height: 100dvh;
      padding: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-inner img {
      max-width: 100%;
      max-height: 92dvh;
      border-radius: 10px;
      object-fit: contain;
    }
    .modal-inner video {
      max-width: 100%;
      max-height: 92dvh;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <!-- Power bar -->
  <div class="bar-wrap" id="bar">
    <div class="bar-label">Tình yêu ⚡</div>
    <div class="bar-track"><div class="bar-fill" id="fill"></div></div>
  </div>

  <!-- Heart (3 shapes) -->
  <div class="heart-wrap" id="heart">
    <div class="hp hp-sq"></div>
    <div class="hp hp-cl"></div>
    <div class="hp hp-cr"></div>
    <div class="heart-shine"></div>
  </div>

  <!-- Button -->
  <button class="btn" id="btn">đừng buồn nữa nhé 🥹</button>

  <!-- Gallery overlay -->
  <div class="gallery" id="gallery">
    <div class="gallery-title">✨ Dành riêng cho em ✨</div>
    <div class="gallery-grid" id="grid"></div>
  </div>

  <!-- Modal viewer -->
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-inner" id="modalInner"></div>
  </div>

<script>
const MEDIA = [
  { type:'image', src:'media/photo1.jpg'  },
  { type:'video', src:'media/video1.mp4'  },
  { type:'video', src:'media/video2.mp4'  },
  { type:'video', src:'media/video3.mp4'  },
  { type:'video', src:'media/video4.mp4'  },
];

const MAX   = 40;
let power   = 0;
let decayId = null;
let done    = false;

const heartEl = document.getElementById('heart');
const barEl   = document.getElementById('bar');
const fillEl  = document.getElementById('fill');
const btnEl   = document.getElementById('btn');
const gallery = document.getElementById('gallery');
const modal   = document.getElementById('modal');
const modalIn = document.getElementById('modalInner');

// ── tap handler ──────────────────────────────────────────────
function onTap(e) {
  if (done) return;
  e.preventDefault();

  // beat
  heartEl.classList.remove('beating');
  void heartEl.offsetWidth;
  heartEl.classList.add('beating');

  // small particles
  const cx = e.clientX ?? (e.touches?.[0]?.clientX ?? innerWidth/2);
  const cy = e.clientY ?? (e.touches?.[0]?.clientY ?? innerHeight/2);
  spawnParticles(cx, cy, 5);

  // power
  power = Math.min(power + 1, MAX);
  setBar();
  if (power >= 3) barEl.classList.add('show');

  // decay reset
  clearTimeout(decayId);
  decayId = setTimeout(decay, 1800);

  if (power >= MAX) explode();
}

heartEl.addEventListener('click', onTap);
btnEl.addEventListener('click', onTap);
heartEl.addEventListener('touchstart', onTap, {passive:false});
btnEl.addEventListener('touchstart',   onTap, {passive:false});

// ── power bar ────────────────────────────────────────────────
function setBar() {
  const pct = power / MAX * 100;
  fillEl.style.width = pct + '%';
  fillEl.classList.remove('pulse');
  void fillEl.offsetWidth;
  fillEl.classList.add('pulse');
}

function decay() {
  if (done || power <= 0) return;
  power = Math.max(0, power - 1);
  setBar();
  if (power === 0) barEl.classList.remove('show');
  else decayId = setTimeout(decay, 350);
}

// ── particles ────────────────────────────────────────────────
const COLORS = ['#ff6b9d','#e8003c','#ff3366','#ff99c0','#ffb3d1'];

function spawnParticles(cx, cy, n) {
  for (let i = 0; i < n; i++) {
    const p  = document.createElement('div');
    p.className = 'ptcl';
    const sz  = 4 + Math.random() * 7;
    const ang = Math.random() * Math.PI * 2;
    const d   = 30 + Math.random() * 70;
    const dur = (.5 + Math.random() * .4) + 's';
    p.style.cssText = `
      width:${sz}px;height:${sz}px;
      left:${cx - sz/2}px;top:${cy - sz/2}px;
      background:${COLORS[Math.random()*COLORS.length|0]};
      --dx:${Math.cos(ang)*d}px;--dy:${Math.sin(ang)*d}px;--dur:${dur};
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

// ── explosion ────────────────────────────────────────────────
const EMOJIS = ['❤️','💕','💖','💗','✨','🌸','💝','🥰','💓'];

function explode() {
  done = true;
  clearTimeout(decayId);

  // animate heart out
  heartEl.classList.remove('beating');
  heartEl.classList.add('exploding');
  btnEl.style.transition = 'opacity .4s';
  btnEl.style.opacity = '0';
  barEl.style.transition = 'opacity .3s';
  barEl.style.opacity = '0';

  // burst particles
  const cx = innerWidth / 2, cy = innerHeight / 2;
  for (let i = 0; i < 48; i++) {
    const p   = document.createElement('div');
    p.className = 'xptcl';
    const ang = (i / 48) * Math.PI * 2 + Math.random() * .3;
    const d   = 90 + Math.random() * 220;
    p.textContent = EMOJIS[Math.random()*EMOJIS.length|0];
    p.style.cssText = `
      left:${cx}px;top:${cy}px;
      --dx:${Math.cos(ang)*d}px;--dy:${Math.sin(ang)*d}px;
      --rot:${Math.random()*720-360}deg;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }

  // show gallery
  setTimeout(() => {
    buildGallery();
    gallery.classList.add('open');
  }, 650);
}

// ── gallery ──────────────────────────────────────────────────
function buildGallery() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  MEDIA.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'g-item';

    if (item.type === 'image') {
      const img = document.createElement('img');
      img.src = item.src;
      img.loading = 'lazy';
      div.appendChild(img);
    } else {
      const vid = document.createElement('video');
      vid.src = item.src;
      vid.muted = true;
      vid.loop  = true;
      vid.playsInline = true;
      vid.preload = 'metadata';
      div.appendChild(vid);

      const overlay = document.createElement('div');
      overlay.className = 'g-play';
      const icon = document.createElement('div');
      icon.className = 'g-play-icon';
      overlay.appendChild(icon);
      div.appendChild(overlay);
    }

    // touch / pointer handling
    let holdTimer = null;
    let isHeld    = false;

    function startHold(e) {
      e.preventDefault();
      div.classList.add('pressed');
      isHeld = false;
      holdTimer = setTimeout(() => {
        isHeld = true;
        if (item.type === 'video') {
          const vid     = div.querySelector('video');
          const overlay = div.querySelector('.g-play');
          vid.play();
          if (overlay) overlay.style.opacity = '0';
        }
      }, 350);
    }
    function endHold(e) {
      clearTimeout(holdTimer);
      div.classList.remove('pressed');
      if (item.type === 'video' && isHeld) {
        const vid     = div.querySelector('video');
        const overlay = div.querySelector('.g-play');
        vid.pause(); vid.currentTime = 0;
        if (overlay) overlay.style.opacity = '1';
        return; // don't open modal after hold preview
      }
      openModal(item);
    }
    function cancelHold() {
      clearTimeout(holdTimer);
      div.classList.remove('pressed');
      if (item.type === 'video') {
        const vid     = div.querySelector('video');
        const overlay = div.querySelector('.g-play');
        vid.pause(); vid.currentTime = 0;
        if (overlay) overlay.style.opacity = '1';
      }
    }

    div.addEventListener('pointerdown',   startHold, {passive:false});
    div.addEventListener('pointerup',     endHold);
    div.addEventListener('pointerleave',  cancelHold);
    div.addEventListener('pointercancel', cancelHold);

    grid.appendChild(div);

    // staggered entrance
    setTimeout(() => div.classList.add('entered'), idx * 100);
  });
}

// ── modal ────────────────────────────────────────────────────
function openModal(item) {
  modalIn.innerHTML = '';
  if (item.type === 'image') {
    const img = document.createElement('img');
    img.src = item.src;
    modalIn.appendChild(img);
  } else {
    const vid = document.createElement('video');
    vid.src = item.src;
    vid.controls = true;
    vid.autoplay = true;
    vid.playsInline = true;
    modalIn.appendChild(vid);
  }
  modal.classList.add('open');
}

function closeModal() {
  const vid = modalIn.querySelector('video');
  if (vid) { vid.pause(); vid.src = ''; }
  modal.classList.remove('open');
}

document.getElementById('modalClose').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
