<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fff0f5">
  <title>Đừng buồn nữa nhé</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      height: 100dvh;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 35%, #ffe4ef 0%, #fff8fb 55%, #ffe0ec 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      position: relative;
    }

    /* ── POWER BAR ── */
    #bar-wrap {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: min(240px, 75vw);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 30;
      text-align: center;
    }
    #bar-wrap.show { opacity: 1; }
    .bar-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #c0003a; margin-bottom: 5px; }
    .bar-track { height: 9px; background: rgba(255,170,200,.3); border-radius: 99px; overflow: hidden; border: 1px solid rgba(255,100,150,.2); }
    #bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffb3d1, #ff3366, #cc0033);
      border-radius: 99px;
      transition: width .1s ease-out;
      box-shadow: 0 0 8px rgba(220,0,60,.4);
    }

    /* ── HEART SVG ── */
    #heart-wrap {
      cursor: pointer;
      user-select: none; -webkit-user-select: none;
      width: 160px; height: 160px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    #heart-wrap svg {
      width: 140px; height: 140px;
      filter: drop-shadow(0 8px 28px rgba(210,0,50,.38));
      transform-origin: center;
      transition: filter .2s;
    }
    @keyframes beat {
      0%   { transform: scale(1); }
      20%  { transform: scale(1.24); }
      45%  { transform: scale(0.91); }
      65%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    #heart-wrap.beating svg { animation: beat .48s cubic-bezier(.36,.07,.19,.97); }

    @keyframes heartExplode {
      0%  { transform: scale(1); opacity: 1; }
      35% { transform: scale(1.9); opacity: 1; filter: drop-shadow(0 0 40px rgba(255,60,80,1)); }
      100%{ transform: scale(0); opacity: 0; }
    }
    #heart-wrap.exploding svg { animation: heartExplode .65s ease forwards; }

    /* ── BUTTON ── */
    #btn {
      background: linear-gradient(135deg, #ff7aaa 0%, #e0003a 100%);
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 99px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .3px;
      cursor: pointer;
      user-select: none; -webkit-user-select: none;
      box-shadow: 0 4px 20px rgba(220,0,58,.4), 0 1px 0 rgba(255,255,255,.25) inset;
      transition: transform .1s, box-shadow .1s, opacity .4s;
      -webkit-appearance: none;
    }
    #btn:active { transform: scale(.93); }

    /* ── PARTICLES ── */
    .ptcl {
      position: fixed; border-radius: 50%; pointer-events: none;
      animation: pfly var(--d,.7s) ease-out forwards;
      z-index: 40;
    }
    @keyframes pfly {
      from { opacity:1; transform:scale(1) translate(0,0); }
      to   { opacity:0; transform:scale(0) translate(var(--dx),var(--dy)); }
    }
    .xmoji {
      position: fixed; pointer-events: none; font-size: 22px; line-height:1;
      animation: xfade 1.1s ease-out forwards;
      z-index: 40;
    }
    @keyframes xfade {
      from { opacity:1; transform:translate(0,0) rotate(0deg) scale(1.2); }
      to   { opacity:0; transform:translate(var(--dx),var(--dy)) rotate(var(--r)) scale(.1); }
    }

    /* ── SCATTER OVERLAY ── */
    #scatter-bg {
      position: fixed; inset: 0;
      background: rgba(10,0,8,.78);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity .5s .1s;
    }
    #scatter-bg.show { opacity: 1; pointer-events: all; }

    /* ── CLOSE BUTTON ── */
    #close-btn {
      position: fixed;
      top: 14px; right: 14px;
      width: 44px; height: 44px;
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.2);
      border-radius: 50%;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      z-index: 70;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s .4s, transform .15s;
    }
    #close-btn.show { opacity: 1; pointer-events: all; }
    #close-btn:active { transform: scale(.88); }

    /* ── SCATTERED MEDIA CARDS ── */
    .scard {
      position: fixed;
      width: 108px; height: 150px;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid rgba(255,130,170,.3);
      background: #1c0010;
      cursor: pointer;
      z-index: 60;
      box-shadow: 0 8px 28px rgba(0,0,0,.6);
      transform-origin: center;
      /* start at center, invisible */
      opacity: 0;
      transition: border-color .2s, box-shadow .2s;
    }
    .scard.active { border-color: rgba(255,130,170,.7); box-shadow: 0 0 20px rgba(255,80,140,.5); }
    .scard img, .scard video { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
    .scard .play-ov {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.18);
      transition: opacity .2s;
    }
    .play-circle {
      width: 40px; height: 40px;
      background: rgba(255,255,255,.88);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .play-circle::after {
      content:'';
      border-left: 14px solid #d0003a;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      margin-left: 3px;
    }

    /* fly-in animation (done via JS inline transition) */

    /* ── MODAL ── */
    #modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.97);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .22s;
    }
    #modal.open { opacity: 1; pointer-events: all; }
    #modal-close {
      position: fixed; top:12px; right:12px;
      width: 44px; height: 44px;
      background: rgba(255,255,255,.13);
      border: none; border-radius: 50%;
      color:#fff; font-size:20px; cursor:pointer;
      z-index:101;
      display:flex; align-items:center; justify-content:center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    #modal-inner { max-width:100vw; max-height:100dvh; padding:8px; display:flex; align-items:center; justify-content:center; }
    #modal-inner img  { max-width:100%; max-height:92dvh; border-radius:10px; object-fit:contain; }
    #modal-inner video{ max-width:100%; max-height:92dvh; border-radius:10px; }
  </style>
</head>
<body>

<!-- Power bar -->
<div id="bar-wrap">
  <div class="bar-label">Tình yêu ⚡</div>
  <div class="bar-track"><div id="bar-fill"></div></div>
</div>

<!-- Heart SVG -->
<div id="heart-wrap" id="heart">
  <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg" fill="#e0003a">
    <path d="M50 85
      C 50 85, 5 55, 5 28
      C 5 12, 16 3, 28 3
      C 36 3, 44 7, 50 15
      C 56 7, 64 3, 72 3
      C 84 3, 95 12, 95 28
      C 95 55, 50 85, 50 85 Z"/>
  </svg>
</div>

<!-- Button -->
<button id="btn">đừng buồn nữa nhé 🥹</button>

<!-- Dark scatter backdrop -->
<div id="scatter-bg"></div>

<!-- Close / back button -->
<button id="close-btn" onclick="resetScene()">✕</button>

<!-- Modal -->
<div id="modal">
  <button id="modal-close" onclick="closeModal()">✕</button>
  <div id="modal-inner"></div>
</div>

<script>
const MEDIA = [
  { type:'image', src:'media/photo1.jpg'  },
  { type:'video', src:'media/video1.mp4'  },
  { type:'video', src:'media/video2.mp4'  },
  { type:'video', src:'media/video3.mp4'  },
  { type:'video', src:'media/video4.mp4'  },
];

const MAX = 38;
let power = 0, decayId = null, done = false;
let scatterCards = [];

const heartWrap = document.getElementById('heart-wrap');
const barWrap   = document.getElementById('bar-wrap');
const barFill   = document.getElementById('bar-fill');
const btn       = document.getElementById('btn');
const scatterBg = document.getElementById('scatter-bg');
const closeBtnEl= document.getElementById('close-btn');
const modal     = document.getElementById('modal');
const modalIn   = document.getElementById('modal-inner');

// ── input ────────────────────────────────────────────
function onTap(e) {
  if (done) return;
  e.preventDefault();

  // beat
  heartWrap.classList.remove('beating');
  void heartWrap.offsetWidth;
  heartWrap.classList.add('beating');

  // particles
  const cx = e.clientX ?? (e.touches?.[0]?.clientX ?? innerWidth/2);
  const cy = e.clientY ?? (e.touches?.[0]?.clientY ?? innerHeight/2);
  burst(cx, cy, 5);

  // power
  power = Math.min(power + 1, MAX);
  barFill.style.width = (power / MAX * 100) + '%';
  if (power >= 3) barWrap.classList.add('show');

  clearTimeout(decayId);
  decayId = setTimeout(decayLoop, 1800);

  if (power >= MAX) triggerExplosion();
}

heartWrap.addEventListener('click', onTap);
btn.addEventListener('click', onTap);
heartWrap.addEventListener('touchstart', onTap, {passive:false});
btn.addEventListener('touchstart', onTap, {passive:false});

// ── decay ────────────────────────────────────────────
function decayLoop() {
  if (done || power <= 0) return;
  power = Math.max(0, power - 1);
  barFill.style.width = (power / MAX * 100) + '%';
  if (power === 0) barWrap.classList.remove('show');
  else decayId = setTimeout(decayLoop, 320);
}

// ── particles ────────────────────────────────────────
const COLS = ['#ff6b9d','#e8003c','#ff99c0','#ff3366','#ffb3d1'];
const EMOJIS = ['❤️','💕','💖','💗','✨','🌸','💝','🥰','💓','🌺'];

function burst(cx, cy, n) {
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'ptcl';
    const sz = 5 + Math.random() * 8;
    const a  = Math.random() * Math.PI * 2;
    const d  = 35 + Math.random() * 65;
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${cx-sz/2}px;top:${cy-sz/2}px;background:${COLS[Math.random()*COLS.length|0]};--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;--d:${.5+Math.random()*.4}s`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 950);
  }
}

function bigBurst() {
  const cx = innerWidth/2, cy = innerHeight/2;
  for (let i = 0; i < 52; i++) {
    const p = document.createElement('div');
    p.className = 'xmoji';
    const a = (i/52)*Math.PI*2 + (Math.random()-.5)*.5;
    const d = 80 + Math.random()*220;
    p.textContent = EMOJIS[Math.random()*EMOJIS.length|0];
    p.style.cssText = `left:${cx}px;top:${cy}px;--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;--r:${Math.random()*720-360}deg`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 1200);
  }
}

// ── scatter positions ─────────────────────────────────
function scatterPositions(n, cardW, cardH) {
  const vw = innerWidth, vh = innerHeight;
  const cx = vw/2 - cardW/2, cy = vh/2 - cardH/2;
  const positions = [];

  for (let i = 0; i < n; i++) {
    const angle  = (i/n) * Math.PI * 2 + (Math.random()-.5) * .7;
    const rx = (vw * .33) + Math.random() * (vw * .08);
    const ry = (vh * .26) + Math.random() * (vh * .08);

    let x = cx + Math.cos(angle) * rx;
    let y = cy + Math.sin(angle) * ry;

    // clamp inside viewport with padding
    x = Math.max(8, Math.min(vw - cardW - 8, x));
    y = Math.max(55, Math.min(vh - cardH - 16, y));

    const rot = (Math.random() - .5) * 22;
    positions.push({x, y, rot});
  }
  return positions;
}

// ── explosion ────────────────────────────────────────
function triggerExplosion() {
  done = true;
  clearTimeout(decayId);

  // heart & button fade
  heartWrap.classList.add('exploding');
  btn.style.opacity = '0';
  btn.style.pointerEvents = 'none';
  barWrap.style.opacity = '0';

  bigBurst();

  setTimeout(() => {
    scatterBg.classList.add('show');
    closeBtnEl.classList.add('show');
    buildScatter();
  }, 600);
}

// ── build scatter ─────────────────────────────────────
function buildScatter() {
  const CW = 108, CH = 150;
  const positions = scatterPositions(MEDIA.length, CW, CH);
  const cx = innerWidth/2 - CW/2;
  const cy = innerHeight/2 - CH/2;

  scatterCards = [];

  MEDIA.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'scard';

    // start at center
    card.style.left = cx + 'px';
    card.style.top  = cy + 'px';
    card.style.transform = 'scale(0) rotate(0deg)';
    card.style.opacity = '0';

    // media element
    if (item.type === 'image') {
      const img = document.createElement('img');
      img.src = item.src;
      img.loading = 'lazy';
      card.appendChild(img);
    } else {
      const vid = document.createElement('video');
      vid.src = item.src;
      vid.muted = true; vid.loop = true;
      vid.playsInline = true; vid.preload = 'metadata';
      card.appendChild(vid);

      const ov = document.createElement('div'); ov.className = 'play-ov';
      const ic = document.createElement('div'); ic.className = 'play-circle';
      ov.appendChild(ic); card.appendChild(ov);
    }

    document.body.appendChild(card);
    scatterCards.push(card);

    // fly to final position (staggered)
    const pos = positions[idx];
    const delay = 80 + idx * 100;

    setTimeout(() => {
      card.style.transition = `left .55s cubic-bezier(.22,1,.36,1) ${delay}ms,
                               top  .55s cubic-bezier(.22,1,.36,1) ${delay}ms,
                               transform .55s cubic-bezier(.22,1,.36,1) ${delay}ms,
                               opacity .3s ease ${delay}ms`;
      card.style.left      = pos.x + 'px';
      card.style.top       = pos.y + 'px';
      card.style.transform = `scale(1) rotate(${pos.rot}deg)`;
      card.style.opacity   = '1';
    }, 20);

    // ── tap / hold logic ──
    let holdTimer = null, isHeld = false;

    function onDown(e) {
      e.preventDefault(); e.stopPropagation();
      isHeld = false;
      card.classList.add('active');

      holdTimer = setTimeout(() => {
        isHeld = true;
        if (item.type === 'video') {
          const v = card.querySelector('video');
          const o = card.querySelector('.play-ov');
          v.play();
          if (o) o.style.opacity = '0';
        }
      }, 380);
    }

    function onUp(e) {
      clearTimeout(holdTimer);
      card.classList.remove('active');

      if (item.type === 'video' && isHeld) {
        const v = card.querySelector('video');
        const o = card.querySelector('.play-ov');
        v.pause(); v.currentTime = 0;
        if (o) o.style.opacity = '1';
        return; // held = preview only, no modal
      }
      openModal(item);
    }

    function onCancel() {
      clearTimeout(holdTimer);
      card.classList.remove('active');
      if (item.type === 'video') {
        const v = card.querySelector('video');
        const o = card.querySelector('.play-ov');
        v.pause(); v.currentTime = 0;
        if (o) o.style.opacity = '1';
      }
    }

    card.addEventListener('pointerdown',   onDown,   {passive:false});
    card.addEventListener('pointerup',     onUp);
    card.addEventListener('pointerleave',  onCancel);
    card.addEventListener('pointercancel', onCancel);
  });
}

// ── reset / close scatter ─────────────────────────────
function resetScene() {
  // fly cards back to center
  const cx = innerWidth/2 - 54, cy = innerHeight/2 - 75;
  scatterCards.forEach((card, i) => {
    const delay = i * 40;
    card.style.transition = `left .4s ease ${delay}ms, top .4s ease ${delay}ms, transform .4s ease ${delay}ms, opacity .3s ease ${delay}ms`;
    card.style.left      = cx + 'px';
    card.style.top       = cy + 'px';
    card.style.transform = 'scale(0) rotate(0deg)';
    card.style.opacity   = '0';
  });

  // hide overlay & close btn
  scatterBg.classList.remove('show');
  closeBtnEl.classList.remove('show');

  // remove cards after animation
  setTimeout(() => {
    scatterCards.forEach(c => c.remove());
    scatterCards = [];
  }, 500);

  // reset heart
  setTimeout(() => {
    heartWrap.classList.remove('exploding', 'beating');
    heartWrap.querySelector('svg').style.animation = 'none';
    heartWrap.querySelector('svg').style.transform = 'scale(1)';
    heartWrap.querySelector('svg').style.opacity   = '1';
    btn.style.opacity       = '1';
    btn.style.pointerEvents = '';
    barWrap.style.opacity   = '1';

    // reset state
    done    = false;
    power   = 0;
    barFill.style.width = '0%';
    barWrap.classList.remove('show');
    clearTimeout(decayId);
  }, 250);
}

// ── modal ─────────────────────────────────────────────
function openModal(item) {
  modalIn.innerHTML = '';
  if (item.type === 'image') {
    const img = document.createElement('img');
    img.src = item.src;
    modalIn.appendChild(img);
  } else {
    const vid = document.createElement('video');
    vid.src = item.src; vid.controls = true;
    vid.autoplay = true; vid.playsInline = true;
    modalIn.appendChild(vid);
  }
  modal.classList.add('open');
}

function closeModal() {
  const v = modalIn.querySelector('video');
  if (v) { v.pause(); v.src = ''; }
  modal.classList.remove('open');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { if (modal.classList.contains('open')) closeModal(); else if (done) resetScene(); } });
</script>
</body>
</html>
